---
camera_params:
  camera:
      serial:
        type: string
        description: "Serial number of the camera."
      exposure_time:
        type: double
        description: "Exposure time of the camera in seconds."
      gain:
        type: double
        description: "Raw gain (0-63, -1=auto)."
      packet_size:
        type: int
        description: "Transport packet size."
      publish_raw:
        type: bool
        description: "Whether or not to publish raw images."
      publish_plane:
        type: bool
        description: "Whether or not to publish plane-rectified images."
      period:
        type: double
        description: "Frame period."
